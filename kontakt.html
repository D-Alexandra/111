<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kontaktujte advokátsku kanceláriu Solid Side. Sme tu pre vás.">
    <meta name="keywords" content="kontakt, advokát, právnik, advokátska kancelária, Solid Side, Trenčín">
    <title>Kontakt | Solid Side</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="images/logo2.svg" alt="Solid Side">
            </a>
            
            <button class="menu-toggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="o-nas.html" class="nav-link">O nás</a></li>
                    <li><a href="sluzby.html" class="nav-link">Služby</a></li>
                    <li><a href="aktuality.html" class="nav-link">Aktuality</a></li>
                    <li><a href="kontakt.html" class="nav-link active">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Contact Hero -->
        <section class="contact-hero contact-hero--simple">
            <div class="container">
                <div class="contact-hero-content contact-hero-content--static">
                    <h1>Kontakt</h1>
                </div>
            </div>
        </section>
        
        <!-- Contact Image -->
        <section class="contact-image-section">
            <div class="contact-image-wrapper">
                <img src="images/trencin.jpeg" alt="Trenčín" class="contact-image">
            </div>
        </section>

        <!-- Contact Info Section -->
        <section class="contact-info-section">
            <div class="contact-info-container">
                <div class="contact-info-row">
                    <div class="contact-info-left">
                        <p>
                            Hlavná ulica 123<br>
                            911 01 Trenčín<br>
                            Slovenská republika
                        </p>
                    </div>
                    
                    <div class="contact-info-right">
                        <p>
                            <a href="tel:+421900000000">+421 900 000 000</a><br>
                            <a href="mailto:info@solidside.sk">info@solidside.sk</a>
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Contact Form Section -->
        <section class="contact-form-section contact-form-section--light">
            <div class="container">
                <div class="section-title" style="margin-bottom: 50px;">
                    <h2>Napíšte nám</h2>
                </div>
                
                <form class="contact-form" action="#" method="POST">
                    <div class="contact-form-row">
                        <div class="contact-form-fields">
                            <div class="form-group">
                                <label for="name">Meno a priezvisko</label>
                                <input type="text" id="name" name="name" placeholder="Vaše meno" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" placeholder="vas@email.sk" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="phone">Telefón</label>
                                <input type="tel" id="phone" name="phone" placeholder="+421 xxx xxx xxx">
                            </div>
                            
                            <div class="form-group">
                                <label for="subject">Predmet</label>
                                <input type="text" id="subject" name="subject" placeholder="O čo máte záujem?">
                            </div>
                            
                            <div class="form-group">
                                <label for="message">Správa</label>
                                <textarea id="message" name="message" placeholder="Popíšte vašu právnu záležitosť..." required></textarea>
                            </div>
                        </div>
                        
                        <div class="contact-form-image-wrapper">
                            <img src="images/formularfoto.jpeg" alt="Kontakt" class="contact-form-image image-contact">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-submit">Odoslať správu</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <a href="index.html" class="footer-logo">
                    <img src="images/logo2.svg" alt="Solid Side">
                </a>
                
                <div class="footer-links">
                    <a href="impressum.html" class="footer-link">Impressum</a>
                    <a href="https://policies.google.com/privacy?hl=sk" class="footer-link" target="_blank" rel="noopener noreferrer">Ochrana súkromia</a>
                    <a href="https://policies.google.com/terms?hl=sk" class="footer-link" target="_blank" rel="noopener noreferrer">Zmluvné podmienky</a>
                    <a href="#" class="footer-link">Spracovanie osobných údajov</a>
                </div>
                
                <div class="footer-social">
                    <a href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="LinkedIn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>
                    </a>
                    <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Facebook">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                    </a>
                </div>
            </div>
            
            <div class="footer-bottom">
                <p class="footer-copyright">© 2026 Solid Side. Všetky práva vyhradené.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
